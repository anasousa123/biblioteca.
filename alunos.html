<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Alunos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
<div class="container">
<a class="navbar-brand" href="index.html">Biblioteca</a>

<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
<li class="nav-item"><a class="nav-link" href="livros.html">Livros</a></li>
<li class="nav-item"><a class="nav-link" href="emprestimos.html">Empréstimos</a></li>
</ul>

</div>
</nav>

<main class="container">

<h2 class="mb-4">Cadastrar Novo Aluno</h2>

<div id="msg"></div>

<form id="formAluno" class="row g-3 mb-5">

<div class="col-md-6">
<input type="text" id="nome" class="form-control" placeholder="Nome" required>
</div>

<div class="col-md-6">
<select id="turma" class="form-select" required>
<option value="">Selecione a turma</option>
<option value="601">601</option>
<option value="602">602</option>
<option value="701">701</option>
<option value="702">702</option>
<option value="801">801</option>
<option value="802">802</option>
<option value="901">901</option>
<option value="902">902</option>
</select>
</div>

<div class="col-md-6">
<select id="nivel" class="form-select" required>
<option value="">Selecione o nível</option>
<option value="Fundamental">Fundamental</option>
<option value="Médio">Médio</option>
</select>
</div>

<div class="col-md-6">
<input type="email" id="email" class="form-control" placeholder="Email">
</div>

<div class="col-12">
<button class="btn btn-primary">Cadastrar</button>
</div>

</form>

<h2 class="mb-3">Lista de Alunos</h2>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Nome</th>
<th>Turma</th>
<th>Nível</th>
<th>Email</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</main>

<script src="./js/alunos.js"></script>

</body>
</html>
