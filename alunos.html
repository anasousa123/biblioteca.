<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alunos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Cadastro de Alunos</h2>

<form id="formAluno">
<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="turma" class="form-control mb-2" placeholder="Turma">
<input id="nivel" class="form-control mb-2" placeholder="Nível">
<input id="email" class="form-control mb-2" placeholder="Email">

<button class="btn btn-primary">Cadastrar</button>
</form>

<ul id="lista" class="mt-4"></ul>

</div>

<script type="module" src="js/alunos.js"></script>

</body>
</html>
