<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Biblioteca</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="livros.html">Livros</a></li>
                <li class="nav-item"><a class="nav-link" href="emprestimo.html">Empréstimos</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">

<h2 class="mb-4">Cadastrar Novo Aluno</h2>

<form class="row g-3 mb-5" onsubmit="event.preventDefault(); cadastrar();">
    
    <div class="col-md-6">
        <label class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Turma</label>
        <input type="text" id="turma" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Nível de Ensino</label>
        <select id="nivel" class="form-select" required>
            <option value="">Selecione</option>
            <option value="Fundamental">Fundamental</option>
            <option value="Médio">Médio</option>
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">Data de Nascimento</label>
        <input type="date" id="data" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
    </div>

    <div class="col-12">
        <button type="submit" class="btn btn-primary">Cadastrar</button>
    </div>
</form>

<h2 class="mb-3">Lista de Alunos</h2>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Turma</th>
            <th>Nível de Ensino</th>
            <th>Data de Nascimento</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody id="tabelaAlunos"></tbody>
</table>

</main>

<script>

// ===== BANCO LOCAL =====
let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

// ===== CADASTRAR =====
function cadastrar(){
    let aluno = {
        nome: document.getElementById("nome").value,
        turma: document.getElementById("turma").value,
        nivel: document.getElementById("nivel").value,
        data: document.getElementById("data").value,
        email: document.getElementById("email").value
    };

    alunos.push(aluno);
    localStorage.setItem("alunos", JSON.stringify(alunos));

    document.querySelector("form").reset();
    listar();
}

// ===== LISTAR =====
function listar(){
    let tabela = document.getElementById("tabelaAlunos");
    tabela.innerHTML = "";

    alunos.forEach((a,i)=>{
        tabela.innerHTML += `
            <tr>
                <td>${a.nome}</td>
                <td>${a.turma}</td>
                <td>${a.nivel}</td>
                <td>${a.data}</td>
                <td>${a.email}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="excluir(${i})">Excluir</button>
                </td>
            </tr>
        `;
    });
}

// ===== EXCLUIR =====
function excluir(i){
    if(confirm("Deseja excluir este aluno?")){
        alunos.splice(i,1);
        localStorage.setItem("alunos", JSON.stringify(alunos));
        listar();
    }
}

// ===== INICIAR =====
listar();

</script>

</body>
</html>
