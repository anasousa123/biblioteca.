<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Empréstimos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">
<div class="container">
<a class="navbar-brand" href="index.html">Biblioteca</a>

<ul class="navbar-nav flex-row gap-3">
<li><a class="nav-link text-white" href="alunos.html">Alunos</a></li>
<li><a class="nav-link text-white" href="livros.html">Livros</a></li>
</ul>
</div>
</nav>

<div class="container">

<h2>Registrar Empréstimo</h2>

<form id="formEmprestimo" class="row g-3 mb-5">

<div class="col-md-6">
<select id="aluno" class="form-select" required></select>
</div>

<div class="col-md-6">
<select id="livro" class="form-select" required></select>
</div>

<div class="col-md-6">
<input type="date" id="dataEmp" class="form-control" required>
</div>

<div class="col-md-6">
<input type="date" id="dataDev" class="form-control" required>
</div>

<div class="col-12">
<button class="btn btn-primary">Emprestar</button>
</div>

</form>

<h3>Pendentes</h3>
<table class="table">
<thead class="table-dark">
<tr>
<th>Aluno</th>
<th>Livro</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="pendentes"></tbody>
</table>

<h3>Devolvidos</h3>
<table class="table">
<thead class="table-dark">
<tr>
<th>Aluno</th>
<th>Livro</th>
</tr>
</thead>
<tbody id="devolvidos"></tbody>
</table>

</div>

<script type="module" src="js/emprestimos.js"></script>

</body>
</html>
