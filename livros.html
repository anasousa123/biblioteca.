<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Livros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">
<div class="container">
<a class="navbar-brand" href="index.html">Biblioteca</a>

<ul class="navbar-nav flex-row gap-3">
<li><a class="nav-link text-white" href="alunos.html">Alunos</a></li>
<li><a class="nav-link text-white" href="emprestimos.html">Empréstimos</a></li>
</ul>
</div>
</nav>

<div class="container">

<h2>Cadastrar Livro</h2>

<form id="formLivro" class="row g-3 mb-5">

<div class="col-md-3">
<input type="number" id="idLivro" class="form-control" placeholder="ID" required>
</div>

<div class="col-md-6">
<input type="text" id="nomeLivro" class="form-control" placeholder="Nome do Livro" required>
</div>

<div class="col-md-6">
<input type="text" id="autor" class="form-control" placeholder="Autor" required>
</div>

<div class="col-md-6">
<input type="text" id="genero" class="form-control" placeholder="Gênero" required>
</div>

<div class="col-md-3">
<input type="number" id="exemplares" class="form-control" placeholder="Exemplares" value="1" min="1">
</div>

<div class="col-12">
<button class="btn btn-primary">Cadastrar</button>
</div>

</form>

<h2>Lista de Livros</h2>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nome</th>
<th>Autor</th>
<th>Gênero</th>
<th>Exemplares</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaLivros"></tbody>

</table>

</div>

<script type="module" src="livros.js"></script>

</body>
</html>
