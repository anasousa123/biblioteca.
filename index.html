<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Biblioteca</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.hero-section {
  background: url('fundo.jpg') center/cover no-repeat;
  height: 100vh;
  position: relative;
}

.overlay {
  background: rgba(0,0,0,0.6);
  height: 100%;
}

.card {
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2">
      <img src="logo.png" width="60">
      <span class="fs-4">Portal Literário René</span>
    </a>
  </div>
</nav>

<section class="hero-section">
<div class="overlay d-flex align-items-center">

<div class="container text-center text-white">

<h1 class="mb-4">Bem-vindo à Biblioteca</h1>
<p class="mb-5">Gerencie alunos, livros e empréstimos</p>

<div class="row justify-content-center g-4">

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h5>Alunos</h5>
<p>Cadastro completo</p>
<a href="alunos.html" class="btn btn-primary">Entrar</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h5>Livros</h5>

<a href="livros.html" class="btn btn-primary">Entrar</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body">
<h5>Empréstimos</h5>

</div>
</div>
</div>

</div>

</div>

</div>
</section>

</body>
</html>
